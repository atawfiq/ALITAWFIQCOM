<!DOCTYPE html>
<html class="staticrypt-html" lang="en">
<head>
  <meta charset="utf-8" />
  <title>Welcome — Williamsburg</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">

  <!-- do not cache this page -->
  <meta http-equiv="cache-control" content="max-age=0" />
  <meta http-equiv="cache-control" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <meta http-equiv="pragma" content="no-cache" />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F7F3EC;
      --ink: #1C1A16;
      --ink-light: #3D3A34;
      --muted: #7A7570;
      --accent: #8B6F47;
      --accent-light: #C4A882;
      --border: rgba(28, 26, 22, 0.12);
      --rust: #9B4A2E;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    /* ── SPINNER ── */
    .staticrypt-spinner-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
    }

    .staticrypt-spinner {
      width: 1.8rem;
      height: 1.8rem;
      border: 2px solid var(--accent-light);
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PASSWORD SCREEN ── */
    .staticrypt-content {
      min-height: 100vh;
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .pw-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    .pw-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      font-weight: 300;
      line-height: 1.05;
      color: var(--ink);
      text-align: center;
      margin-bottom: 0.8rem;
    }

    .pw-title em {
      font-style: italic;
      color: var(--accent);
    }

    .pw-sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.7;
    }

    .pw-divider {
      width: 40px;
      height: 1px;
      background: var(--accent-light);
      margin: 0 auto 2rem;
    }

    /* ── FORM ── */
    #staticrypt-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      width: 100%;
      max-width: 320px;
    }

    .staticrypt-password-container {
      width: 100%;
      position: relative;
    }

    #staticrypt-password {
      width: 100%;
      padding: 0.85rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #FDFAF5;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      text-align: center;
      letter-spacing: 0.05em;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    #staticrypt-password:focus { border-color: var(--accent-light); }

    /* hide the show/hide toggle icon */
    .staticrypt-toggle-password-visibility { display: none; }

    /* remember me — hidden since we disabled it */
    .staticrypt-remember { display: none !important; }

    .staticrypt-decrypt-button {
      width: 100%;
      padding: 0.8rem;
      background: var(--ink);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .staticrypt-decrypt-button:hover { opacity: 0.82; }

    /* error state — alert() is replaced inline */
    .pw-error {
      font-size: 12px;
      color: var(--rust);
      display: none;
      text-align: center;
    }

    .hidden { display: none !important; }
  </style>
</head>
